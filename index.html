</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="sidebar-logo-icon" data-lucide="swords" width="16" height="16"></i>
        <h1><span>Value</span>Arena</h1>
        <button class="sidebar-toggle" id="sidebar-toggle-btn" title="Toggle sidebar">
          <i data-lucide="panel-left-close" width="16" height="16"></i>
        </button>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-item active" data-tab="chat">
          <i data-lucide="message-square-plus" width="16" height="16"></i>
          <span class="sidebar-label">New Chat</span>
        </button>
        <button class="sidebar-item" data-tab="leaderboard">
          <i data-lucide="trophy" width="16" height="16"></i>
          <span class="sidebar-label">Leaderboard</span>
        </button>
        <button class="sidebar-item" data-tab="experiments">
          <i data-lucide="flask-conical" width="16" height="16"></i>
          <span class="sidebar-label">Experiments</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <a href="https://github.com/ValueArena/ValueArena.github.io" target="_blank">

        </a>
        <a href="https://huggingface.co/datasets/invi-bhagyesh/ValueArena" target="_blank">
          <img src="assets/models/hf.png" width="13" height="13" alt="" style="border-radius:2px"> HF
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <i data-lucide="moon" width="14" height="14"></i>
        </button>
      </div>
      <!-- Resize handle -->
      <div class="sidebar-resize" id="sidebar-resize"></div>
    </aside>

    <!-- Mobile top bar -->
    <div class="mobile-topbar" id="mobile-topbar">
      <button class="mobile-menu-btn" id="mobile-menu-btn" title="Menu">
        <i data-lucide="menu" width="20" height="20"></i>
      </button>
      <span class="mobile-title"><span>Value</span>Arena</span>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <i data-lucide="moon" width="14" height="14"></i>
      </button>
    </div>
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main content -->
    <main class="main-content">
      <div class="main-body">
        <div id="tab-chat" class="tab-pane active">
          <div class="loading">Loading chat...</div>
        </div>
        <div id="tab-leaderboard" class="tab-pane">
          <div class="loading">Loading leaderboard...</div>
        </div>
        <div id="tab-experiments" class="tab-pane">
          <div class="loading">Loading runs...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/constitutions-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/hf-fetch.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/index.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    function toggleTheme() {
      const t = document.documentElement.dataset.theme === "light" ? "dark" : "light";
      document.documentElement.dataset.theme = t;
      localStorage.setItem("va-theme", t);
    }
    (function() {
      const saved = localStorage.getItem("va-theme");
      document.documentElement.dataset.theme = saved || "light";
    })();

    // Sidebar collapse/expand
    (function() {
      const sidebar = document.getElementById("sidebar");
      const toggleBtn = document.getElementById("sidebar-toggle-btn");
      const mobileBtn = document.getElementById("mobile-menu-btn");
      const overlay = document.getElementById("sidebar-overlay");
      const saved = localStorage.getItem("va-sidebar");

      if (saved === "collapsed" && window.innerWidth > 768) sidebar.classList.add("collapsed");

      function closeMobileSidebar() {
        sidebar.classList.remove("open");
      }

      toggleBtn.onclick = () => {
        if (window.innerWidth <= 768) {
          closeMobileSidebar();
        } else {
          sidebar.classList.toggle("collapsed");
          localStorage.setItem("va-sidebar", sidebar.classList.contains("collapsed") ? "collapsed" : "expanded");
        }
      };

      mobileBtn.onclick = () => {
        sidebar.classList.toggle("open");
      };

      overlay.onclick = closeMobileSidebar;
    })();

    // Sidebar resize
    (function() {
      const sidebar = document.getElementById("sidebar");
      const handle = document.getElementById("sidebar-resize");
      let dragging = false;

      handle.addEventListener("mousedown", (e) => {
        if (sidebar.classList.contains("collapsed")) return;
        dragging = true;
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        const w = Math.min(Math.max(e.clientX, 180), 400);
        sidebar.style.width = w + "px";
        localStorage.setItem("va-sidebar-width", w);
      });

      document.addEventListener("mouseup", () => {
        if (!dragging) return;
        dragging = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });

      const savedW = localStorage.getItem("va-sidebar-width");
      if (savedW && !sidebar.classList.contains("collapsed") && window.innerWidth > 768) {
        sidebar.style.width = savedW + "px";
      }
    })();

    // Activate initial tab after all scripts loaded
    if (window._activateTab) window._activateTab();
  </script>
</body>
</html>
